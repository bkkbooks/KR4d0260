body:
  text: 野處類藁巻下宋洪邁撰書僧房陸續流泉自成句來擁紅爐聴山雨道人更有深深處詰曲如珠蟻絲度几硯無塵寒欲霧雕盤篆破孤螢吐味如嚼蠟那禁咀茶甘未囘君莫去題蘆雁屏征鴻坐何事天遣南北飛蕭然如旅人無情自相依孤葦吹欲折秋風不勝威㝠㝠一孤騫空費弋者機寒聲落烟渚相應不我違嗟我識此情手納空歎欷安知丹青師落筆迺庶幾畫形孰不工畫意識者稀他時因吾句購此千金揮題臨賦軒蒼山圍岑寂下有一水奔閉戸卧風雨蓬蒿翳籬藩寥哉祇樹人心逺忘世喧此身自蘧廬長物餘此軒鳥語幽夢斷香横經帙翻未成借路行自要窺潺湲逺師淵明意不愧靈澈魂月度了無迹風行偶成痕心境兩清妙尺喙何由吞賦詩安所取碧雲未足論何當拂朱絲竊𦕈絃吾言答併安江師送米不見道人久天涯嵗云除朝來食指動忽接送米書念師折脚鐺五合未省餘雖無覆餗禍尚有乞食逋云何憐孤客日受飢火驅未曽貸監河矧肯索胡奴誰言斗升意矯矯超萬夫嗟予事筆畊輕棄南畝鋤慁煩方外客此計良已疎何時事粗了歸葺五畝居生涯寄緯竹豈即非良圖不為泉壤蚓願學江湖魚陳徳瑞饋新茶空山㝠㝠雲霧忩春風好夢欹殘缸朝來果得故人柬㣲凸而么犀銙雙貴人争買百瓔珞此心兒女久已降坐觀市井起攘袂念之使我心紛厖領君此意九鼎重雖有筆力安能扛何時來施三昧手慰我渴夢思長江次韻希旦喜雨驕陽挾酷暑何啻虎而翼髙田土可籭况迺耕與殖風伯真可訟雲合吹復拆那知下土民糟粕配橡實古佛棲巖隈旱沴豈吾責應縁賢令尹閔雨丏法力積隂暝山谷流潤凄几格朝來賀客散置酒浣愁疾古詩成雲外險句動潛蟄旋看蓑笠出競喜溝澮溢誰言今與佛念我一何悉嗟我困蒿藜最覺民可恤何當問牛喘免使訴魚失九關虎豹守懐此欲安適誰哉此心同吾飽將何日古風二首寄汪明道紫蘭初茁芽深壑終自秀骯髒蕭艾中不采則誰咎兒曹逐紛華壯士保窮陋應知此調同萬世無先後又俗士白人眼從誰明此心不欲故人見訶我車轍深蕭然江上廬髙卧詩書林得句不相寄誰賞氣駸駸建安道中吾生意行初不謀泛泛何啻波中鷗攜家來作閩海夢三年客食天南陬我先人廬在何許大江之左道阻修奉新家有手足愛隻身歸掃先梧楸旋當來此營斗粟南北顛倒無時休此心轉與世事左自作磨螘將誰尤安知不滿達者笑窮達一戲如觀優咄哉吾語亦已墮且與造物同浮游書事呈元聲如愚起華三兄隱吏朱墨暇飽眠北忩風時呼方外客逃暑尊酒中寂寞杜拾遺四壁口不供坐取盤飱疑哀哉豈天窮何如平生友磁鐵間不容每懐千里駕今作五斗逢吏行散鳬鶩楸局收鸞龍共話十年舊事往如飛蓬浮榮真一戲何者為窮通應須河漢語淨洗芥蔕胸僕夫適在門客醉尊亦空更為後日約及此芙蓉紅寄題起莘家義軒貞觀盛徳後餘慶未渠央舊聞閩海家欲縱燕山芳教子嗣先訓開軒翼中堂地偏市朝逺几淨書簡香先生陳太邱飰糜百憂忘弟子真下材不聞觸屏僵一變豪俠窟遂成鄒魯鄉下車里門外他年看諸郎坐上紆素髮詵詵立冠裳我詩自可絃請以侑壺觴梅花山深春未動沙淺水欲氷玉梅於此時靚粧略無朋露蕋欲的皪月枝挂鬅鬙儼如江漢女可愛不可陵他年江南路曉粧犯嚴凝尋香烟雨中横斜插茆簦却數今幾日痴如秋後蠅北嶺枝欲空誰與扶一登聊分窺水影依我照字燈坐使惜花夢臨風脚騰騰昔如夢中蝶今學桑下僧了知菩提長念起吾何曽十一月十九日與仲猷大年綽中美中飲於南臺空山欲雪雲㝠㝠玉梅半開吾眼青此身垂欲走塵土聊復舉酒看峥嶸折腰向人不知恥故園可鋤在千里金昆石友一開眉珍重道人相料理楚江東岸先人廬竹君安否久無書歸歟何時應白首我食斯言如此酒春社齋禁連雨不止賦呈夢得歳豐農猶飢歲惡何可説哀哉半菽氓罪嵗同一舌年時旱塵漲臘盡不見雪青皇忽雨我萬頃麥苖活令尹民父母溝壑思手挈祈年祓齋禁有酒不忍設那知桃李徑狼籍香泥滑芳意倐如此坐恐及鶗鴂郊原佇開晴出勞南畝饁秋成已在眼一醉宇宙豁更呼湔裙人勸此側帽客和公斜川詩磨石鑱嵗月次韻夢得見示長篇雉馴不因媒鳩暖自呼婦詩成桃李隂知是霹靂手簿書我亦厭邱壑渠自有却憐支離疏飽食得薪槱俗夫嘗世味甘苦半噦嘔知公超然處心跡兩無垢愁隂老芳物蟲鳥故相誘浪蕋費收拾柔條可結揉豈無我輩人一醉開笑口那知市門底客倦枕兩肘眼髙可人稀命蹇亨運偶平生願執鞭見謂予小友細觀愷悌心宜在帝左右却來塵埃中寂寞對五栁鷇音藏鵠羽正待荆雞剖學政容窺譜問字當載酒虛名翻誤夢恐坐箕與斗言詩終不稱永愧賦瓊玖身閒書有味吏傲俗不親小忩據物表掃盡心眼塵令尹垂珠玉敲門喚行春作意向芳物吾車曽未巾愁隂入病骨鳩婦聲亦嗔㝠㝠三日雨桃李迹已陳空餘深枝間一一青子新穠芳殿春晚猶堪慰佳辰酴醿曉籹靚芍藥醉臉勻白蕚簪嫋嫋風巵倒粼粼言當呼短舞抵掌囘雙顰年來得相從稍覺安沈淪豈不掛俗事察公極清真眼中醉鄉路風味良獨醇流光不容玩尺璧何足珍漓俗益可厭願言勤問津牡丹酴醿各一首呈周宰珍藂壓朝露無人羞欲欹春風醉香骨綽約不自持誰憐曲肱人一笑遣穠姿不言意可了君醉當勿疑妝淡洗逾靚肌香薰不成皎然月露姿一笑午景晴聊移夢蝶床相對户不扄誰令風雨暴睡起春縱横次韻夢得淺紅芍藥長句十日愁隂病不出卧看春歸無計惜詩翁遣送淮海春衰眼熨開雲霧拆胭脂注臉勻未遍肉紅借酒生真色了知造物著意深傾倒春工不餘力年來不顧溱洧女載酒非公復安適且將妙句寫餘姸欲立佳名付精識一春頗困歌漫汗囘首紛華三太息願言乞與洗心方歸對爐香誦周易宿禪寂院夢中一葉搖江湖困睡不覺身籃輿眼明佛屋麗丹碧瓦鴟鐵鳳凌空虚疲民日者困苛索半作頳尾相濡魚鵜鶘數罟兩不置肯念竭澤明年無道人誰與辦此事斤瑑千指開渠渠頗疑如幻三昧力上方手攬歸吾廬了知舌本法輪轉咄嗟檀施争奔輸不辭割愛一念善誰謂嵗惡窮民愚書生袖手對溝壑力不能援心煩紆事無大小成者少談説治亂何區區調卑絃急誠齟齬鑿圓枘方尤闊疎古今罪嵗同一口撫掌一笑皆愚儒詩約范直夫遊萬葉寺觀瀑泉范侯隠下吏好尚本邱園身投攫金市藂書以自藩烱然如孤月不受黄流渾要知句律工競病何足論我生羣末俗涇渭同一源同心無楚越傾蓋如弟昆人生各有役不暇捧一尊風蒲掛南浦念欲東南奔對牀定何夕青燈照晤言懸知和詩處千尺銀河翻次韻夢得見示之什居楚求齊音美惡不同土喧豗俗物華羣復有佳處時從玉璧人商略窮萬古詩如栗牛戲誤得摩頂許望道𣺌逾逺乆生真暫寓忍持尺璧隂空作秋虫語㣲言儻傾倒河漢濯肺腑向來説詩口自此行可杜送甌寧魏生赴武舉生後與金人戰有功戰沒於邯建安少年請纓客横槊賦詩兩無敵辭家去作入彀英氣拂天狼夜無迹廟堂勝算安邊隅智名勇功付壯夫引弓沒羽世自有敢問上䇿當何如陳仲仁止止堂以我有限景逐彼無涯知失足踐畏途投身試危機舟車日奔覆定無邱與夷萬古踐此轍嗟我與誰歸仲仁古静者懐璧照褐衣名途嘗一戲囘首羞前非心如得坎水不受狂風吹功名憂不免當復定所之請觀本無作今復止者誰築堂市門側著書園不窺蓬藋深一丈圖書周四圍時有好事人載酒問所疑攫金奮敏手倚市誇妍姿囘光時自照何者非吾師送志宏西上九州眼一槩餘子真瑣瑣嶽立培塿中喜此髙岋峨如公我輩人取友亦到我揮毫賦垂天風雨巻蓬顆相期八表遊未覺夙心左解龜醉江閣酒面山月墮起瞻帝鄉雲感歎不成坐何須飛霞佩自辦凌風舸瀛洲𣺌溟渤萬里一掀簸緘詩寄天涯秉燭對新火那知市門仙斗禄事么麽空餘腸九迴上疏何日果有懐舍弟逢年時歸婺源以詩督之木落天未霜君歸定何時相思如驚鵲中有未安枝夢中見阿連鏘然詠新詩寤驚衰葉翻道是步屐移攬衣下中庭風露浩淼瀰遙知客衣薄歸來一何遲平生短檠燈相對忽解頤萬古一舒巻佳處良在兹是中及物心上與稷契期援古以自例自矢無乃癡夜义叱九閽側足不敢窺坐令一寸心日抱二柄疑遲君商量此恐得兒輩嗤况乃緑髮親倚門鬢欲絲豨膏非鳳喙車轄無可脂再拜夀百分斑衣舞參差秋芳未云歇采采黄金蕤萬鍾不足樂古人豈吾欺九月十七日夜度蔡道嶺宿彌勒院月出度松嶺露香霏羽衣肅肅夜氣清蒼蒼烟徑㣲川光浴秋容蘿影挂夕輝氷輪碾空闊飛轍闕擬掬星渚波恐觸天孫機偓佺何時見闕未應青霞志即與素願違稍休塵外蹤憇此巖下扉清吟寫萬籟妙想絶百非不須河漢言盡闕華圍飛仙亦戲劇𤣥學乃庶幾鼇山切丹極歳晚行將歸遊鄭圃城郭不去眼而得林壑娯低徊撫壯心欲吐無與俱鏗然一枝笻細磴半樵漁挽衣徑與飲不省誰為吾女貧苦難妍女貧苦難妍士貧苦難髙了知論此者不識一世豪此身百斛鼎流俗欲手操寧當捨其中局促計所遭頗疑有若人骯髒棲蓬蒿考槃一邱壑光景不可韜斯人不我忘空復踰垣逃軒裳亦云華唾去如腥臊哀哉夸毗子擾擾冠猿猱恬無齊世心閔黙死滔滔朅來事斗禄俯仰身桔橰一官戲人間幾何非餮饕誰言眷此幘擲去輕秋毫區區欲驕士一哭嗟兒曹溪南梅花巉巉石逕鳴枯笻意行詰曲無西東心知幽壑梅已動一枝寄我曽未䝉暗香横路忽驚顧氷蕋的皪蠻烟中有如佳人久去眼邂逅相得情何窮蔬畦壓霜翠羽亂已覺雪片棲丰茸嗟吾辜此來已晚攀條嚼蕊聊從容玉仙遊戲下塵世絶艶一洗汞鉛空不知閬苑在何許叱囘風馭無怱怱溪寒沙淨迷俯仰坐待山月來朦朧豈無樽酒相煖熱錦裘起舞如驚鴻仇池老仙羽化久妙曲三叠餘仙風歸時醉倒不知和明日來此誰能同再和柬首座道人昔曳匡廬笻五老負雪湓江東犯寒貪覔玉梅句雖有衲被何曽䝉歸來苦雨熟梅子巻裓深卧蠻烟中詩傳絶境忽入手置我鄉國情何窮十年不踏江上路漠漠海氣昏貂茸異鄉嵗晚慰流落一笑賴此氷雪容嶠南絶唱誰敢和騎鯨人去塵寰空崐墟下視堪笑閔雕琢肝腎愁怱怱那知幽子雲雨上風斤玉斧脩朣朧讀詩令我一囘首杳若目送孤飛鴻何時晤語折鐺側坐聽萬籟號天風拈花特地兩顔解他時與子真參同奉酬令徳寄示長句閒官屋舍如幽棲寒苦餘業償鹽虀忽聞鵲聲作破竹尺書入手誰所齎交遊勝絶似公少矯矯鸞孔依蒿藜青㝠側足在咫尺誰使狡獪捐其梯秋風溪上共樽酒擺落羈束忘畛畦紅裳起舞意未足缺月銜嶺星河低只今跌宕走塵土清夢往復無山谿新詩驚怪爛盈幅筆力抝怒蟠虹霓遙知槃礴小忩底得喪已著一理齊此生同困造物戲未覺與世誰雲泥雖無絶唱追白雪賴有妙契如靈犀一笑從公豈無日挽袖相屬空玻璃不須俗物敗真賞但覔佳處同攀躋答林康民見和梅花詩寒崦人家碧谿尾一樹江梅卧清水闕不受俗眼汙風斂天香瘴烟裡向來休沐偶無事誰我亦遊二三子彎碕曲逕一攜笻凍雀驚飛能莫委班荆勸客小延佇酌酒賦詩相料理多情入骨憐閔殊休倚横斜嚼氷蕋至今清夢掛殘月强作短歌傳闕韻髙常恨白難稱賴有君詩清且美天涯嵗晚感鄉物歸歟何時路千里柁樓一笛雪漫空囬首江亭淚如洗上丁餘膰置酒招綽中徳粲徳闕逢年我生無幾求畢願老葭菼誰令事闕書生亦可憐㣲物有先感朝來食指動膰肉豐咀啖恭惟魯司冦道大長壈坎空餘祠千載闕永言百世師願學吾豈敢當飢不忘安闕飽復何闕安能如王孫長物貯頤頷意呼闕一醉捨鉛槧相攜桃李徑厯亂蹴紅毯言强三尺闕平生超然處獨嗜逾昌歜詩成持寄君莫遣兒闕用綽中韻送正臣正臣欲歸隠而無資闕其意以告識者云爾華裾錦領烏紗幘氣蓋當年五陵俠胸中磈礧不可平拂衣歸來抱長鋏軒然寄傲楸枰間長闕隠闕雲山相逢笑我舂㣲粟我歸未可君何闕牛吼音誰能立談夀千金空令擁鼻誦招隠知君心在仙峰隂故山自歎無歸期作詩但擬淵明詞却愁他日林下信千里寄我唯當歸秋懐六首一庭柯一葉失風挾涼氣歸湛湛陂水清芙蕖脱紅衣非無岑寂士句法妙𤣥暉獨懐履霜戒徳人貴知微二真儒六經學文字聊解紛長孺棄諸侯漢庭相公孫兒口乳未乾妄作黒白分誰能領斯㑹事往風中雲三導江自岷山源淺觴可濫下集大小川千闕水府暗䇿䇿井桐凉烱烱忩月淡後生抱奇衷黄墨勤㸃勘四市朝富危機匹夫死馮河何如狎鷗子烟雨同一波行藏各有趣不在相詆訶我師陋巷人千古冠四科五穿堵超玉繩影倒夜忩寂火雲一洗空月露清欲滴幽人負疴卧起坐三歎息歸同對牀弟暗語永佳夕六掩忩耿不寐道人亦無悰故山新稻香粥曽警枯桐夢中信了了推枕聞西風少遲穉金壯歸善與子同逢年與徳粲同之温陵謁大智禪師醫作四小詩送之丈室揜槐夏與君同卧疴平生莫逆人裹飯誰見過跰􅓷起鑑井萬古寂不波觀心要知足造物如吾何又六年别故山松竹故無恙此身已天涯飄走復何向清源老醫師砭樓出投杖勿辭一往勤挹彼上池漲又石梁跨蠔山永與方壺久慿君持一盃往酹濟川手遙知相攜處溟渤浸箕斗作詩問大鈞猶有斯人否又山河我四大物我同一體誰為苦疾癢搔按不容擬多生抱此念耿耿未云已那知知魚樂更有濠梁子與陳彦時㑹華嚴道人偶書屋頭烟雲屯屋下波濤喧團欒坐已久起扣丹霞門客至苦舌强目擊翻無言元龍湖海士懐哉夙契敦清坐鼎足峙妙語流潺湲君逰華嚴海貝葉手自翻此心於身世鳥度空無痕笑我流浪中久披業識吞讀書談古今綺語生禍根望道𣺌未見况乃躐其籓職卑困掣肘見溺不得援未知造物心頗復哀黎元近窺顔稷意未敢遽揜關躬耕亦細事㑹要五畝園釋羈牛在牧駕鼓馬伏轅居然見優劣不比魚熊蹯持問跏趺人一笑霜眉掀相攜妙峰頂瞑色窺逺村解衣略輩行班坐搴芳蓀欲歸意未已幽徑相與捫蒼崕出玉醴不受瘴毒温願言同酌此我語庶不諼書栟櫚院壁側身西來度千山列仙仙去空孱顔斗升自役應笑我何苦詰曲戲塵寰歸耕無田仕難合疑此二柄首鼠間摩挲崖石三歎息我心安得如汝頑次志宏韻督成夀置酒歸耕食吾言囬首愧江水方爭揚子席誰置穆生醴鄧侯傾蓋舊小寢藝桃李走書約啗我涎迸齧唇齒朝來獨何事怒色劇染指雖㣲射鴻遊顧有捩手鬼平生談天口得酒便鋒起年來病不觴但要謳貼耳真成畫蛇足足就酒空矣樊川吐怨句想見紫雲美何時咄嗟辦一醉吾亦擬噂沓聽羣兒口實争笑鄙野處類藁巻下
