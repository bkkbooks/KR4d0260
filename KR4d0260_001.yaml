body:
  text: 野處類藁巻上宋洪邁撰秋日漫興二首江湖久客日思家坐覺㣲霜上鬢華節序又催秋後雁風光爭發雨前花倦遊已夢莊生蝶不飲何憂廣客蛇怪底朝來衣袖薄一川白露下蒹葭其二一夕西風木葉飛畫梁落月淡餘輝銀燈夜照還家夢金剪親裁寄逺衣霜信早隨新雁至素書深訝故人稀無因為謝東曹掾鱸熟蓴香莫便歸庚戌正月十四日同友人丁晉年王蔚之謁普照塔孤塔凌霄漢晴影金碧眩重來得寓目歸柁尾殘汴緬懐何姓人哀禱傾淮甸是身如皎月有水著處現彈指遍大千何止數鄉縣惟應應縁地聊爾共流轉顛危悔靳馬善渉悟覔扇君看悔與悟只在一轉盻至人獨何心示此禍福變當知夙縁定莫作邪道見哀哉衆生愚積惡稔天譴云何一朝急賴此香火薦我來適燈夕寶蠟明邃殿還揩容塵眼重睹浮檀面朝來塔上鈴告我風色便平淮一囘首岸容失葱蒨曉過呉縣舟行有嚴程越國常曉發雙櫓兀殘夢起坐窺落月人家岸野水霧雨籠邃闥遙憐瑣忩人欹枕聽甌軋陪餘杭張無隅先生飲先生結屋在人境門巷蕭蕭作氷冷紛紛入眼不入意座客千言不相領叩關聞我倒屣迎重解舊榻塵埃生向來妙處久不吐一挽天漢崐崘傾共説别來經世事我言所向皆兒戲胸中磈磊不用澆便有清愁説無地士林師範六一翁先生合在伯仲中願言終賜指歸處為公敬作曽南豐於潛道中山行厭犖确理䇿扶欹危緑野三兩家一息知可期冉冉晴林端炊烟裊晴暉其民豐且樂恐是太古遺那知都邑間百索困鞭笞繁華今何有半作道旁羸度芙蓉嶺幽泉端為誰放溜雜琴筑山深春未老泛泛浪蕋馥娟娟菖蒲花可玩不可觸靈根盤翠崖老作蛇蚓蹙褰裳踏下流濯此塵土足何當餌香節浄洗心眼肉餘功到方書萬巻不再讀晚歳窮名山靈苗縱穿斸菖蒲服之通神令人聰明健記信州禪月臺上玉峰㸃寥廓霄漢疑可梯玉水環城隂灔灔方拍隄層臺擅二美吾䇿一時攜何當蠟吾屐更欲照以犀塵勞不相赦竟類窮途迷我生麋鹿爾不羨駕輅驪向來邱壑懐語發人所詆長安黒頭公玉勒朝金閨山林出戲言廣已無端倪誰收遮日手歸把耕雨犂紛紛塵土中等是舞甕雞頗聞山水間幽子飯藿藜行當踐此語絶境同攀躋送渾師住妙香寺本住雲溪道人捨幽居誰管溪上雲此身自雲耳遑暇南北分頗聞妙香山天花雨繽紛宴坐丈室間厯亂舊衲紋山前路悠悠山後水汶汶應觀川途客念我奔走勤豈無香火縁他年往相羣飽食跛鐺飯稀摘幽澗芹當令桃花臺白社掩前薰坐睡坐久睡屢兀手失末了書清風脱然至心醒得我娯起看孤隙光了不移錙銖云何短夢中萬境生須㬰嗟彼市朝子百巧營其軀安知非夢役過眼滅無餘至人有達觀那與世賢愚不須無言子同上崐崘墟遊山光寺寺藏兩山腹路轉百步隂登髙試病脚掬冷清煩襟敗壁龕石刻嵗月不可尋唯應查公石俯仰閲古今屋古困枝柱摧頺力難任何當咄嗟辦嗣彼鐘梵音興衰豈關吾得酒且滿斟歸路有溪月攬之醒吾心送建州徐生人羈天地間誰非一浮萍泛然偶相值便有離合情君家武夷下歸路塵眼明我生愛山者夢寐秀色横秋風送客去把手更心傾爾逢山中人為我寄此聲贈覺師覺師儒門秀脱屣世故早那知軒冕味夙悟心已槁惟餘章句習心境時相惱如人生於齊而即楚鄉老雖遭楚人咻㣲音或清好固無益生死亦未妨至道家山亦何有骯髒衣間蚤叢林選佛場一擲想盆倒云何慰故居俯仰待華皓他年空手歸子語吾為考幸分曹溪水萬刼付一澡休寧村落間有奇石如彈子渦所出者宜養石菖蒲程徳藻許以餽我以詩督之君家緑溪上岸曲溪成渦渦間石無數水蹙相蕩磨誰嘗掬而戲一一印指螺我欲往取之擁此菖蒲窠石罌注新汲幽姿發清哦夫子許餉我往督書已多願言速寄與起此泉石疴效淵明人生本無事况我麋鹿姿一墮世網中永與林壑辭此行獨何事豈不為寒饑弱嵗慕古人頗覺世好卑那知齒髪邁終然此心違春風到山澤魚鳥亦知時吾行何日休流目瞻長岐且用陶翁言一觴聊可揮酬馮退翁見示之什我家大江左江水日夜東遙瞻發源處乃在西南窮相望邈異境正北一水通故令我與子迹逺心自同我生寡所諧强顔紅塵中倦飛矯歸翮飢吟咽寒蛩獨欣得吾子萬慮一咲空時時出秀句醒我如風松當知山澤臞不鄙犀角豐彈冠寔伊始此生各飛蓬卜鄰固未必即事聊從容戲答胡汝能我生苦中狹與世枘鑿乖平生素心人耿耿不滿懐汝能伯始後遊世如嬰孩相逢握手語便作塤篪諧時時笑謂我如子患未涯執古以規今求合誠難哉渉世幸未逺子車尚可囘我介足怨忌君通絶嫌猜不見山巨源雍容居鼎台不見嵇中散絶交自可哀賢愚心自了短韻共一咍謁呉公路許借論衡復留一日戲作幽獨不自得駕言欵齋廬殷勤主人情投轄恐囘車轄亦不須投此去將焉如唯憂酒錢盡使我詩腸枯㑹合曽幾何可復自作疎更當留一夕帳中搜異書新秋幽人無與娯耳冷百不聞新米熟未知但覺市酒醇滄洲散秋色山水逾清新一醉不忍獨念我存故人道中得雨我行野田間吁嗟連數村千山收宿雨谿作黄梅渾漸看風葉底一洗龜坼痕餘功被行客稍壓旱塵昏道中驕陽久自殺一雨蕩龜坼田夫夢亦好翻隴已幽咽朝來喜相語一飽心已决翻翻風葉亂嫋嫋露芒白去年禾欲秀積潦滿秋澤今年豈堪旱束手就溝壑我生拙謀口藜藿甘如蜜向來真過計憂民豈吾職赤子天可憐嗟人獨何力何湏事兒戲合沓來賀客稍欣新稻熟社酒行可覔當同扶路翁醉歸舞南陌失題前年谿上秋風時主人酒熟烹黄雞歸來醉倒睡便著父老喚起牛羊蹊此生一醉寕易得未辨身為貴人客征西將軍爾何人那用尊前驚墮幘朅來閩越再經秋聞道軒名涎已流懸知得酒推不去此客有轄何湏投今我正為奔走役空想題詩滿髙壁若逄落魄姓囘人為問何時定相覔書忩對月天公自厭雨一夕開寒晴霜風净曠野洪落有餘聲飢鴉得林静霽月索忩生熨開睡眼色一洗空花横故人千里餘壺濁誰與傾遙知勸影盃共此通夕情今冬有竒事三見飛玉英明年谿上路誰餉雨中耕宿野人家夢裡滄波搖一葉覺來正受肩輿兀人家一宿晚可投新席槁梧香更滑霜前䆉稏收百畝稚子新能牧鵝鴨我生本是箇中人挾䇿久矣猶能説度石棟嶺我行欲安適束馬踰山樊谷深不可瞬危磴争猱猿坡陀兩山間寂厯三家村茅簷青裙婦蓬髮薪烟昏敲冰那可飲分我一掬温郎樵晚未歸客至不與言不奉沙頭巵肯投栁下門作詩配國風行者式其藩用退之韻賦新霽春泥窘幽步苔上屐痕少新晴一褰衣緑葉藏啼鳥方塘灔宿漲古鏡窺清曉華顛忽自笑綵羽墮驚矯瞻言雲中耕縹緲穹脊繞歸把東皋犂此念何日了送金確然歸弋陽昔我雲溪居送子雲溪濆重來問何時笑指谿上雲一别四周星坐此世故紛衰顔兩非昔華髪粲可耘我纒風樹悲終日無一欣子乃菽水憂尚此奔走勤對床語未終懸知便離分霜風吹客袂别意如絲棼子歸葛陂上去路接鄉枌歸夢尚隨子何當歎離羣至節日建州㑹詹士元嗟予身百憂佳節過倥偬客愁隨綫増歸思與灰動當年從子日未覺百慮重髙堂遶床呼一擲有餘勇那知客天涯相對寒骨聳嵗月曽幾何鬢絲今種種忍飢山藥煮附煖地爐擁深藏㫁還往衰病脱拜拱興言望鄉關雲物方鬱滃空餘相屬意盃酒久不捧用前韻答翁子静客心既岑寂節物亦倥偬幽籬菊初暗深壑梅已動古人傲尺璧顧謂寸隂重欲從夫子遊掣肘愧不勇松髙節磊砢鶴老格清聳當知山澤臞誰羨將相種一官戲人間叢書以自擁㣲言聞緒餘三歎手輙拱青天本寥廓不受雲霧滃願言瞻清明茗盌不辭捧㣲雨端居身百憂况乃貧病俱天公頗相哀雨我蔬藥區曉晴新青句日薄生意蘇衛生固未必一飽行可圖故園天一涯茅荆誰為鋤峥嶸歲云晚此念當何如寄題叔父池亭一壑久藏勝數椽忽開亭方塘䕃瓦影淨見魴鯉行主人有嘉招轉柁失髙城不知幾搖兀杙舟上崢嶸尊酒酌芳淥園蔬煮柔青翩翩射鴨弓一笑翻綵翎那知海陬姪斗粟忘歸耕餘生信萍梗歸夢識林坰漲水有囘波故鄉豈無情一醉㑹有日因之濯塵纓贈謝彦翔建安人九嵗異人與藥至今不食建安有梅子真升仙處我本世味薄寸田足自營年來荆棘盡稍有梨棗萌但恐骨相凡未敢希長生陳留達人後未齓犀角盈舊遊記三山幽夢徹九清爾來三十年但覺膏梁腥幽尋飯緑髓黙卧誦黄庭顧我塵土中深慰夙心傾仙人呉門卒解后煩寄聲相期朝金闕鶴馭何時征考亭陳國器以家釀餉吾友人卓民表民表以飲予香味色皆清絶不可名狀因為製名曰武夷仙露仍賦一首二年飲水閩中村忽見玉醴傾蠻尊涓涓醍醐灌熱惱耿耿沆瀣明朝暾旱塵久漲城市暗渴夢欲挽江湖吞何人逺致雙鯉信知我來扣羅雀門不須邀月已清絶尚恐熨齒當微温要從華池汲真液豈獨𤣥鬢薅愁根㣲茫已識投轄客娬媚似返當爐魂奇功誰續伯倫頌妙意要與淵明論胸中我自有涇渭筆下君已傾崐崘詩成寄與約他日飲君與我空瓶盆久旱新嵗乃雨髙田土可籭下田不受犁遺蝗憂插啄况乃麥未齊赤子天自憐溝壑忍見擠雨逐新歳來停雲忽凄凄莫辭三日霖為作一尺泥汪汪既沒膝灔灔仍拍隄漸看蓑笠出笑語喧畛畦我欲與寓目父老同攀躋此身羣萬生擾擾舞甕雞曽亦無幾求脱粟配羮藜永言故隴耕老眼路凄迷好收斂版手鋤耰歸自攜春日與卓民表陳國器步出北郊灼灼桃吐華濯濯栁垂縷芳菲挽人出春力乃如許嗟予閉門客佳節過不數不因可人呼那得幽步舉客如山隂勝詩作斜川語誰言一尊酒妙處合千古歸來讀殘書耿耿霜月苦空餘流落心三歎非吾土蔬飯蕨拳嬰兒手笋解籜龍蜕薦羞杞菊間采斸烟雨外嗟予飯藜藿咽塞舟泝瀨朝來二美兼一飽良已泰充腸我誠足染指客應嘅平生食肉相蕭瑟何足賴王郎催牛炙韓老憶鯨鱠使氣信雄夸戲語亦狡獪我師魯顔子陋巷翳蓬艾執瓢不可從一取清泉酹戲贈呉知伯條侯得劇孟呉楚坐可馘我知無能為失此一敵國偉哉奇男子俠氣横八極書生復何者骯髒老筆墨刺口論安危事往竟何益匹夫嘯空野驚塵一方塞區區空有意浩蕩洗鋒鏑何如呉王孫語輒面浮赤交游得朱亥負販鄙膠鬲腰間鐵絲箭上鏃紫塞翮笑指蛇豕區滅此而後食諸公未備知欲薦恨無力明日我過君烹牛呼社客當書游俠傳令子姓名白送僧空中世界紛河沙不知底處為天涯乾坤百億在指掌觸處與子同一家云何猶作去來想千里一跌毫釐差坐令契闊費星紀嶺雲欲寄山川遐撥肩相對此何日丈室淨掃餘天花詩豪辨舌久投閣萬竅寂厯風無譁為君遊戲出三昧妙處那復相聱牙往將妙響應空谷一任飛來遂止車野處類藁巻上
