body:
  text: 野處類藁别集類三宋提要臣等謹案野處類藁二卷宋洪邁撰邁以才學贍博雄視一時所著容齊隨筆夷堅志唐人萬首絶句俱别著録其文集見於宋藝文志者有野處猥稿一百四卷瓊野録三卷而陳振孫書録解題祗載有此集二卷且云全集未見則當時傳播已稀惟明張萱內閣書目有野處內外集九册無卷數當即全集中不完之本流傳僅存者今亦已散佚無可考世所行邁集獨有此本而已集前有邁自序稱甲戌之春家居卧病作詩若干首以自當緩憂之一物遂取曩時所存而未弃者録為二卷甲戌為髙宗紹興二十四年蓋邁退居鄱陽時所作而集中謁普照塔詩又有庚戌紀年當在建炎三年相去已二十四五嵗僅得詩八十餘首又容齊三筆紀紹興十九年在福建貢院與葉晦叔所作詩正在甲戌之前而集中並未載入疑本就篋笥所貯偶然裒輯故所録闕略如此然其生平韻語惟藉此以考見大槩則零圭斷璧未嘗不足存備一家也又案馬端臨經籍考載此書入别集類然集中有詩無文依端臨之例宜入詩集類而舛錯誤收殆亦未見此本歟乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀野處類藁原序余自束髮即喜學詩然隨作隨棄初不留意也甲戌之春家居卧病因復作詩若干首以自當緩憂之一物昔人所謂內抑鬱外揚為聲音者是也遂取曩時所存而未棄者録為野處類藁二卷鄱陽容齊洪邁自序
